<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Глосарій мануальника</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #2563eb;
      --accent-light: #eff6ff;
      --tag-bg: #f3f4f6;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: baseline;
      gap: 1rem;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    header p.subtitle {
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* ── Layout ── */
    .layout {
      display: flex;
      min-height: calc(100vh - 61px);
    }

    /* ── Sidebar ── */
    aside {
      width: 220px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      padding: 1.5rem 1rem;
      position: sticky;
      top: 0;
      height: calc(100vh - 61px);
      overflow-y: auto;
    }

    aside label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    #search {
      width: 100%;
      padding: 0.4rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 1.5rem;
    }

    #search:focus { border-color: var(--accent); }

    .alpha-nav {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .alpha-nav a {
      font-size: 0.8rem;
      color: var(--muted);
      text-decoration: none;
      padding: 0.15rem 0.4rem;
      border-radius: 3px;
      transition: background 0.1s, color 0.1s;
    }

    .alpha-nav a:hover,
    .alpha-nav a.active {
      background: var(--accent-light);
      color: var(--accent);
    }

    /* ── Main ── */
    main {
      flex: 1;
      padding: 2rem 2.5rem;
      max-width: 780px;
    }

    .count {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 1.75rem;
    }

    /* ── Letter group ── */
    .letter-group {
      margin-bottom: 2.5rem;
    }

    .letter-group h2 {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.4rem;
      margin-bottom: 1rem;
    }

    /* ── Entry ── */
    .entry {
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
    }

    .entry:last-child { border-bottom: none; }

    .entry-term {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.25rem;
    }

    .entry-aka {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
      font-style: italic;
    }

    .entry-def {
      font-size: 0.9rem;
      color: #374151;
      margin-bottom: 0.6rem;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }

    .tag {
      font-size: 0.7rem;
      background: var(--tag-bg);
      color: var(--muted);
      padding: 0.15rem 0.5rem;
      border-radius: 3px;
    }

    /* ── No results ── */
    #no-results {
      display: none;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 2rem 0;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1rem 2rem;
      font-size: 0.75rem;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      aside { display: none; }
      main { padding: 1.25rem 1rem; }
      header { padding: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>Глосарій мануальника</h1>
  <p class="subtitle">Польовий довідник різновидів — очима соцмереж</p>
</header>

<div class="layout">

  <aside>
    <label for="search">Пошук</label>
    <input id="search" type="search" placeholder="термін…" autocomplete="off" />

    <div class="alpha-nav" id="alpha-nav"></div>
  </aside>

  <main>
    <p class="count" id="count"></p>
    <div id="glossary"></div>
    <p id="no-results">Нічого не знайдено.</p>
  </main>

</div>

<footer>
  Глосарій поповнюється. Усі терміни — фольклор соцмереж, не стандарт.
</footer>

<script>
const TERMS = [
  {
    term: "Автоматизатор у серці",
    aka: "wannabe automation, мануал-який-хоче-в-авто",
    def: "Формально тестує руками, але в кожному пості пише «роблю курс з Selenium». Дев'ятий місяць. Курс ще не дороблений.",
    tags: ["кар'єра", "самоідентифікація", "вічний джуніор"],
    letter: "А",
  },
  {
    term: "Джуніор-мануальщик",
    aka: "джун без досвіду, QA-джун",
    def: "Тільки прийшов у QA після курсів. Пише тест-кейси за шаблоном, боїться репортити баги розробникам особисто і щиро вірить, що ISTQB Foundation відкриє всі двері.",
    tags: ["джуніор", "курси", "початківець"],
    letter: "Д",
  },
  {
    term: "Кліко-тестувальник",
    aka: "monkey tester, кліколог",
    def: "Методично натискає кнопки за тест-кейсом, не відхиляючись ні на піксель. Тест пройшов — галочка стоїть. Що воно робить — не питай.",
    tags: ["іронія", "тест-кейси", "механічне тестування"],
    letter: "К",
  },
  {
    term: "Мануал з АІ",
    aka: "AI-assisted QA, мануальщик нового покоління",
    def: "Використовує ChatGPT для генерації тест-кейсів, Copilot — щоб написати SQL-запит до БД, і Midjourney — щоб зробити красивий скріншот для баг-репорту. Автоматизацією це не вважає.",
    tags: ["AI", "інструменти", "сучасний підхід"],
    letter: "М",
  },
  {
    term: "Мануальщик-ветеран",
    aka: "досвідчений мануальщик, senior 10+",
    def: "10+ років у тестуванні, всі процеси знає напам'ять. Щиро не розуміє, навіщо автоматизація, якщо він уже все перевірив руками. Новачків навчає, але по-своєму.",
    tags: ["досвід", "сеньор", "опір змінам"],
    letter: "М",
  },
  {
    term: "Мануальщик в автоматизацію",
    aka: "перехідний вид, automation переучень",
    def: "Пише автотести на Python після п'яти років мануального тестування. Тести нестабільні, але він гордий. У резюме вже вказано «QA automation engineer».",
    tags: ["перехід", "автоматизація", "кар'єрний ріст"],
    letter: "М",
  },
  {
    term: "Сертифікований мануальщик",
    aka: "ISTQB-мануальщик, certified tester",
    def: "Пройшов ISTQB Foundation і тепер знає різницю між verification та validation. У роботі це не застосовує, але в суперечках посилається. Значок у LinkedIn є.",
    tags: ["сертифікація", "ISTQB", "теорія"],
    letter: "С",
  },
  {
    term: "Традиційний мануальщик",
    aka: "класичний мануальщик, old-school QA",
    def: "Тестує руками, веде тест-кейси в Excel, баги — в Jira. Не розуміє хайпу навколо автоматизації. «Якщо я можу перевірити за 10 хвилин, навіщо писати скрипт тиждень?»",
    tags: ["класика", "Excel", "ручне тестування"],
    letter: "Т",
  },
  {
    term: "Чисто мануальний QA",
    aka: "pure manual, без автоматизації",
    def: "Принципово не пише жодного рядка коду. «Я тестувальник, а не програміст». Може бути при цьому дуже сильним спеціалістом із відмінним чуттям продукту — або ні.",
    tags: ["позиція", "без коду", "ручне тестування"],
    letter: "Ч",
  },
];

// ─── Build glossary ───────────────────────────────────────
function groupByLetter(items) {
  const map = {};
  for (const t of items) {
    if (!map[t.letter]) map[t.letter] = [];
    map[t.letter].push(t);
  }
  return map;
}

function renderGlossary(items) {
  const container = document.getElementById("glossary");
  const noResults = document.getElementById("no-results");
  const countEl   = document.getElementById("count");

  container.innerHTML = "";

  if (!items.length) {
    noResults.style.display = "block";
    countEl.textContent = "";
    return;
  }

  noResults.style.display = "none";
  countEl.textContent = `${items.length} ${plural(items.length, "термін", "терміни", "термінів")}`;

  const grouped = groupByLetter(items);
  const letters = Object.keys(grouped).sort();

  for (const letter of letters) {
    const group = document.createElement("div");
    group.className = "letter-group";
    group.id = `letter-${letter}`;

    const h2 = document.createElement("h2");
    h2.textContent = letter;
    group.appendChild(h2);

    for (const t of grouped[letter]) {
      const entry = document.createElement("div");
      entry.className = "entry";
      entry.innerHTML = `
        <div class="entry-term">${esc(t.term)}</div>
        ${t.aka ? `<div class="entry-aka">також: ${esc(t.aka)}</div>` : ""}
        <div class="entry-def">${esc(t.def)}</div>
        <div class="tags">${t.tags.map(tag => `<span class="tag">${esc(tag)}</span>`).join("")}</div>
      `;
      group.appendChild(entry);
    }

    container.appendChild(group);
  }
}

function buildAlphaNav(items) {
  const letters = [...new Set(items.map(t => t.letter))].sort();
  const nav = document.getElementById("alpha-nav");
  nav.innerHTML = "";
  for (const l of letters) {
    const a = document.createElement("a");
    a.href = `#letter-${l}`;
    a.textContent = l;
    nav.appendChild(a);
  }
}

function esc(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function plural(n, one, few, many) {
  const mod10 = n % 10, mod100 = n % 100;
  if (mod10 === 1 && mod100 !== 11) return `${n} ${one}`;
  if (mod10 >= 2 && mod10 <= 4 && (mod100 < 10 || mod100 >= 20)) return `${n} ${few}`;
  return `${n} ${many}`;
}

// ─── Search ───────────────────────────────────────────────
document.getElementById("search").addEventListener("input", function () {
  const q = this.value.trim().toLowerCase();
  if (!q) {
    renderGlossary(TERMS);
    buildAlphaNav(TERMS);
    return;
  }
  const filtered = TERMS.filter(t =>
    t.term.toLowerCase().includes(q) ||
    (t.aka  && t.aka.toLowerCase().includes(q)) ||
    t.def.toLowerCase().includes(q) ||
    t.tags.some(tag => tag.toLowerCase().includes(q))
  );
  renderGlossary(filtered);
  buildAlphaNav(filtered);
});

// ─── Init ─────────────────────────────────────────────────
renderGlossary(TERMS);
buildAlphaNav(TERMS);
</script>

</body>
</html>
